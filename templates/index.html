<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Customer Churn Prediction</h1>
        <div class="text-center mb-3">
            <a href="/bulk" class="btn btn-secondary">Bulk Upload</a>
        </div>
        <form method="POST" class="mt-4">
            <div class="row">
                <!-- First Column -->
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select id="gender" name="gender" class="form-select">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="SeniorCitizen" class="form-label">Senior Citizen</label>
                        <select id="SeniorCitizen" name="SeniorCitizen" class="form-select">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="Partner" class="form-label">Partner</label>
                        <select id="Partner" name="Partner" class="form-select">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>

                <!-- Second Column -->
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="Dependents" class="form-label">Dependents</label>
                        <select id="Dependents" name="Dependents" class="form-select">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="tenure" class="form-label">Tenure</label>
                        <input type="number" id="tenure" name="tenure" class="form-control" required>
                    </div>
                </div>

                <!-- Third Column -->
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="Contract" class="form-label">Contract</label>
                        <select id="Contract" name="Contract" class="form-select">
                            <option value="Month-to-month">Month-to-month</option>
                            <option value="One year">One year</option>
                            <option value="Two year">Two year</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="PaymentMethod" class="form-label">Payment Method</label>
                        <select id="PaymentMethod" name="PaymentMethod" class="form-select">
                            <option value="Electronic check">Electronic check</option>
                            <option value="Mailed check">Mailed check</option>
                            <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                            <option value="Credit card (automatic)">Credit card (automatic)</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>

        {% if prediction %}
        <div class="mt-4 text-center">
            <h3>Prediction: {{ prediction }}</h3>
            <p>Probability: {{ probability | round(2) }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
